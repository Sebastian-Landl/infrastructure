log:
  level: INFO

accessLog:
  filePath: "/var/log/traefik/access.log"

api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
  websecure:
    address: ":443"
    http:
      middlewares:
        - secureHeaders@file
        - crowdsec-bouncer@file
      tls:
        certResolver: letsencrypt

certificatesResolvers:
  letsencrypt:
    acme:
      email: <EMAIL_ADDRESS>
      storage: acme.json
      keyType: EC384
      tlsChallenge: {}

experimental:
  plugins:
    bouncer:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: "v1.5.1"

providers:
  docker:
    exposedByDefault: false
    network: "public"
    endpoint: "unix:///var/run/docker.sock"
  file:
    filename: /configurations/dynamic.yml