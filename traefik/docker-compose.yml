services:
  traefik:
    image: traefik:v3.6.10
    container_name: traefik
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${TRAEFIK_CONFIG_PATH}:/etc/traefik/traefik.yml:ro
      - ${TRAEFIK_ACME_PATH}:/acme.json
    networks:
      - public

networks:
  traefik-net:
    name: public
