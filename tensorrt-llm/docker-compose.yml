services:
  trtllm-server:
    image: ${DOCKER_IMAGE:-nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc12}
    container_name: ${CONTAINER_NAME:-tensorrt-llm}
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      TIKTOKEN_ENCODINGS_BASE: /tiktoken_encodings
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
      - ./model_configs:/model_configs:ro
      - ./tiktoken_encodings:/tiktoken_encodings:ro
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    entrypoint:
      - bash
      - -c
      - |
        echo "/usr/local/tensorrt/lib" > /etc/ld.so.conf.d/tensorrt.conf && ldconfig
        exec trtllm-serve "$@"
      - --
    command:
      - "serve"
      - "${MODEL_HANDLE}"
      - "--max_batch_size"
      - "${MAX_BATCH_SIZE:-64}"
      - "--trust_remote_code"
      - "--no-telemetry"
      - "--port"
      - "${PORT:-8000}"
      - "--host"
      - "0.0.0.0"
      - "--extra_llm_api_options"
      - "${MODEL_CONFIG_FILE:-/model_configs/default.yml}"
      - "--reasoning_parser"
      - "${REASONING_PARSER:-auto}"
      - "--tool_parser"
      - "${TOOL_PARSER:-auto}"
    networks:
      - litellm_model_backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

networks:
  litellm_model_backend:
    external: true
