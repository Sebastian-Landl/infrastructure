services:
  vllm:
    image: vllm/vllm-openai:v0.20.2
    container_name: ${CONTAINER_NAME:-vllm}
    ipc: host
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - VLLM_USE_FLASHINFER_MOE_FP4=${VLLM_USE_FLASHINFER_MOE_FP4:-}
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
      - ./reasoning_parsers:/app/reasoning_parsers:ro
    ports:
      - "${VLLM_PORT:-8000}:8000"
    networks:
      - litellm_model_backend
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ "${VLLM_INSTALL_AUDIO_DEPS:-0}" = "1" ]; then
          python3 -m pip install 'vllm[audio]'
        fi
        exec vllm serve ${VLLM_MODEL} \
          --served-model-name ${VLLM_SERVED_MODEL_NAME} \
          --host 0.0.0.0 \
          --port 8000 \
          --trust-remote-code \
          --max-model-len ${VLLM_MAX_MODEL_LEN:-131072} \
          --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.85} \
          --kv-cache-dtype ${VLLM_KV_CACHE_DTYPE:-fp8} \
          --max-num-seqs ${VLLM_MAX_NUM_SEQS:-8} \
          --max-num-batched-tokens ${VLLM_MAX_NUM_BATCHED_TOKENS:-2048} \
          --enable-chunked-prefill \
          ${VLLM_MOE_BACKEND:+--moe-backend ${VLLM_MOE_BACKEND}} \
          ${VLLM_REASONING_PARSER_PLUGIN:+--reasoning-parser-plugin ${VLLM_REASONING_PARSER_PLUGIN}} \
          --reasoning-parser ${VLLM_REASONING_PARSER:-nemotron_v3} \
          ${VLLM_VIDEO_PRUNING_FLAG:-} \
          ${VLLM_MEDIA_IO_KWARGS_FLAG:-} \
          ${VLLM_ALLOWED_LOCAL_MEDIA_FLAG:-} \
          --enable-auto-tool-choice \
          --tool-call-parser ${VLLM_TOOL_CALL_PARSER:-qwen3_coder} \
          --dtype ${VLLM_DTYPE:-bfloat16} \
          ${VLLM_SPECULATIVE_CONFIG_FLAG:-}

    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  litellm_model_backend:
    external: true
