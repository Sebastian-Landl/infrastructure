services:
  vllm:
    image: avarok/dgx-vllm-nvfp4-kernel:v23
    container_name: ${CONTAINER_NAME:-vllm}
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      # --- SM12.1 / model-specific --- loaded from .env.nano or .env.super
      - VLLM_NVFP4_GEMM_BACKEND=${VLLM_NVFP4_GEMM_BACKEND:-marlin}
      - VLLM_USE_FLASHINFER_MOE_FP4=${VLLM_USE_FLASHINFER_MOE_FP4:-0}
      - VLLM_FLASHINFER_MOE_BACKEND=${VLLM_FLASHINFER_MOE_BACKEND:-latency}
      - VLLM_FLASHINFER_ALLREDUCE_BACKEND=${VLLM_FLASHINFER_ALLREDUCE_BACKEND:-}
      - VLLM_TEST_FORCE_FP8_MARLIN=${VLLM_TEST_FORCE_FP8_MARLIN:-1}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-0}
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
      # Place nano_v3_reasoning_parser.py / super_v3_reasoning_parser.py here
      - ./reasoning_parsers:/app/reasoning_parsers
    ports:
      - "${VLLM_PORT:-8000}:${VLLM_PORT:-8000}"
    # Shell entrypoint allows optional flags to be passed as empty strings
    # without vllm choking on blank arguments
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        vllm serve ${VLLM_MODEL} \
          --served-model-name ${VLLM_SERVED_MODEL_NAME} \
          --host 0.0.0.0 \
          --port ${VLLM_PORT:-8000} \
          --dtype auto \
          --kv-cache-dtype ${VLLM_KV_CACHE_DTYPE:-fp8} \
          --tensor-parallel-size 1 \
          --pipeline-parallel-size 1 \
          --data-parallel-size 1 \
          --trust-remote-code \
          --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.80} \
          --enable-chunked-prefill \
          --max-num-seqs ${VLLM_MAX_NUM_SEQS:-4} \
          --max-model-len ${VLLM_MAX_MODEL_LEN:-262144} \
          --moe-backend ${VLLM_MOE_BACKEND:-marlin} \
          --mamba_ssm_cache_dtype ${MAMBA_SSM_CACHE_DTYPE:-float32} \
          ${VLLM_QUANTIZATION_FLAG} \
          ${VLLM_ASYNC_SCHEDULING_FLAG} \
          ${VLLM_CUDAGRAPH_FLAG} \
          --speculative_config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}' \
          --reasoning-parser-plugin ${VLLM_REASONING_PARSER_PLUGIN} \
          --reasoning-parser ${VLLM_REASONING_PARSER} \
          --enable-auto-tool-choice \
          --tool-call-parser ${VLLM_TOOL_CALL_PARSER:-qwen3_coder}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]